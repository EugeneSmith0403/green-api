run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - goimports
    - revive
    - unused

linters-settings:
  goimports:
    local-prefixes: github.com/evgenijkuznecov/green-api

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: docs/
      linters:
        - all
